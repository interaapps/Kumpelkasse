spring.application.name=api

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/mydatabase?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:myuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secret}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server port (optional)
server.port=8080

# Swagger/OpenAPI (if using springdoc)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

app.public-base-url=${APP_PUBLIC_BASE_URL:https://kumpelkasse.interaapps.de}
app.ios.team-id=${APPLE_TEAM_ID:}
app.ios.bundle-id=${IOS_BUNDLE_ID:de.interaapps.kumpelkasse}
app.android.package-name=${ANDROID_PACKAGE_NAME:de.interaapps.kumpelkasse}
app.android.sha256-cert-fingerprints=${ANDROID_SHA256_CERT_FINGERPRINTS:}

interaapps.oidc.client-id=${INTERAAPPS_OIDC_CLIENT_ID:09njrvu6mntgkte}
interaapps.oidc.client-secret=${INTERAAPPS_OIDC_CLIENT_SECRET:}
